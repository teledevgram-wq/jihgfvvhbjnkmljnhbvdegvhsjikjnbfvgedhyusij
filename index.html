<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Telegram Bot Webhook</title>
    <style>
        body {
            font-family: system-ui, -apple-system, sans-serif;
            background: #f5f5f5;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            padding: 20px;
        }
        .status-card {
            background: white;
            border-radius: 16px;
            padding: 30px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.1);
            max-width: 500px;
            text-align: center;
        }
        h1 { margin-bottom: 10px; }
        .badge {
            background: #e8f5e9;
            color: #2e7d32;
            padding: 8px 16px;
            border-radius: 30px;
            font-weight: 500;
            display: inline-block;
            margin: 15px 0;
        }
        .url-box {
            background: #f5f5f5;
            border-radius: 8px;
            padding: 12px;
            font-family: monospace;
            word-break: break-all;
            border: 1px solid #ddd;
            margin: 15px 0;
        }
        .btn {
            background: #000;
            color: white;
            border: none;
            padding: 12px 24px;
            border-radius: 8px;
            font-size: 16px;
            cursor: pointer;
            margin: 5px;
        }
        .btn.secondary {
            background: #e0e0e0;
            color: #000;
        }
    </style>
</head>
<body>
    <div class="status-card">
        <h1>🤖 Telegram Bot Webhook</h1>
        <div class="badge">✅ Активен</div>
        <p>Этот URL принимает обновления от Telegram</p>
        
        <div class="url-box" id="webhookUrl">Загрузка...</div>
        
        <button class="btn" onclick="setWebhook()">🔗 Установить вебхук</button>
        <button class="btn secondary" onclick="getWebhookInfo()">ℹ️ Информация</button>
        <button class="btn secondary" onclick="deleteWebhook()">🗑️ Удалить</button>
        
        <div id="log" style="margin-top: 20px; text-align: left; max-height: 200px; overflow-y: auto; background: #f9f9f9; padding: 10px; border-radius: 8px; font-size: 12px;"></div>
    </div>

    <script>
        // ========== ТВОИ ДАННЫЕ ==========
        const BOT_TOKEN = "8246292350:AAFHyIRmAFYF0cnzD6xNjDlw2O8vRnw6AWs";
        const MISTRAL_API_KEY = "DDyw1QG5kQhTTjhi1f9byoQTHgdCyJiC";
        
        // Текущий URL страницы (будет вебхуком)
        const WEBHOOK_URL = window.location.href;
        
        // Хранилище истории чатов
        const chatHistory = {};
        
        // Системный промт
        const SYSTEM_PROMPT = {
            role: "system",
            content: "Ты Devstral - дружелюбный AI помощник! Общайся естественно, иногда используй эмодзи, но не перебарщивай. Отвечай всегда в мужском роде. Форматирование: *текст* для жирного, _текст_ для курсива, `код` для кода, > для многострочного кода."
        };

        // ========== ФУНКЦИИ ДЛЯ TELEGRAM API ==========
        async function callTelegram(method, params = {}) {
            const url = `https://api.telegram.org/bot${BOT_TOKEN}/${method}`;
            const response = await fetch(url, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(params)
            });
            return await response.json();
        }

        async function sendMessage(chatId, text) {
            const formattedText = formatTelegramMessage(text);
            return await callTelegram('sendMessage', {
                chat_id: chatId,
                text: formattedText,
                parse_mode: 'HTML'
            });
        }

        // Форматирование для Telegram HTML
        function formatTelegramMessage(text) {
            if (!text) return '';
            
            let formatted = text
                .replace(/</g, '&lt;')
                .replace(/>/g, '&gt;');
            
            // Разбираем строки для цитат
            let lines = formatted.split('\n');
            let result = [];
            let i = 0;
            
            while (i < lines.length) {
                if (lines[i].trim().startsWith('&gt;')) {
                    let quoteLines = [];
                    while (i < lines.length && lines[i].trim().startsWith('&gt;')) {
                        let content = lines[i].replace(/^(&gt;\s?)/, '');
                        quoteLines.push(content);
                        i++;
                    }
                    result.push('<blockquote>' + quoteLines.join('<br>') + '</blockquote>');
                } else {
                    result.push(lines[i]);
                    i++;
                }
            }
            
            formatted = result.join('\n');
            
            // Форматирование
            formatted = formatted
                .replace(/\*\*(.*?)\*\*/g, '<b>$1</b>')
                .replace(/\*(.*?)\*/g, '<b>$1</b>')
                .replace(/_(.*?)_/g, '<i>$1</i>')
                .replace(/`(.*?)`/g, '<code>$1</code>');
            
            return formatted.replace(/\n/g, '<br>');
        }

        // ========== ОБРАБОТКА СООБЩЕНИЙ ==========
        async function handleMessage(update) {
            const chatId = update.message.chat.id;
            const userId = update.message.from.id;
            const text = update.message.text;
            
            log(`📩 Сообщение от ${userId}: ${text}`);
            
            // Команда /start
            if (text === '/start') {
                await sendMessage(chatId, "👋 Привет! Я Devstral AI. Задавай любые вопросы!");
                return;
            }
            
            // Инициализация истории
            if (!chatHistory[userId]) {
                chatHistory[userId] = [SYSTEM_PROMPT];
            }
            
            // Добавляем сообщение пользователя
            chatHistory[userId].push({ role: "user", content: text });
            
            try {
                // Запрос к Mistral AI
                const response = await fetch('https://api.mistral.ai/v1/chat/completions', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                        'Authorization': `Bearer ${MISTRAL_API_KEY}`
                    },
                    body: JSON.stringify({
                        model: "mistral-tiny",
                        messages: chatHistory[userId]
                    })
                });
                
                if (!response.ok) {
                    throw new Error(`Mistral API error: ${response.status}`);
                }
                
                const data = await response.json();
                const reply = data.choices[0].message.content;
                
                // Добавляем ответ в историю
                chatHistory[userId].push({ role: "assistant", content: reply });
                
                // Ограничиваем историю
                if (chatHistory[userId].length > 10) {
                    chatHistory[userId] = [chatHistory[userId][0], ...chatHistory[userId].slice(-9)];
                }
                
                // Отправляем ответ
                await sendMessage(chatId, reply);
                log(`✅ Ответ отправлен`);
                
            } catch (error) {
                log(`❌ Ошибка: ${error.message}`);
                await sendMessage(chatId, "😕 Ошибка при обращении к AI. Попробуй позже.");
            }
        }

        // ========== ОБРАБОТЧИК ВЕБХУКА ==========
        window.handleWebhook = async function(event) {
            // Для GitHub Pages нужно через GET параметры
            const urlParams = new URLSearchParams(window.location.search);
            const update = urlParams.get('update');
            
            if (update) {
                try {
                    const parsed = JSON.parse(decodeURIComponent(update));
                    await handleMessage(parsed);
                } catch (e) {
                    log(`Ошибка парсинга: ${e}`);
                }
            }
        };

        // ========== ФУНКЦИИ УПРАВЛЕНИЯ ==========
        async function setWebhook() {
            log(`🔧 Устанавливаю вебхук на: ${WEBHOOK_URL}`);
            
            // Для GitHub Pages используем специальный формат
            const webhookWithParam = WEBHOOK_URL + '?webhook=1';
            
            const result = await callTelegram('setWebhook', {
                url: webhookWithParam
            });
            
            if (result.ok) {
                log('✅ Вебхук установлен!');
            } else {
                log(`❌ Ошибка: ${result.description}`);
            }
        }

        async function getWebhookInfo() {
            const result = await callTelegram('getWebhookInfo');
            if (result.ok) {
                log(`📊 Информация:\n${JSON.stringify(result.result, null, 2)}`);
            }
        }

        async function deleteWebhook() {
            const result = await callTelegram('deleteWebhook');
            if (result.ok) {
                log('🗑️ Вебхук удален');
            }
        }

        function log(msg) {
            const logDiv = document.getElementById('log');
            logDiv.innerHTML += `[${new Date().toLocaleTimeString()}] ${msg}<br>`;
            logDiv.scrollTop = logDiv.scrollHeight;
        }

        // Инициализация
        document.getElementById('webhookUrl').textContent = WEBHOOK_URL;
        log('🚀 Сервер запущен');
        
        // Проверяем, не пришел ли апдейт
        window.handleWebhook();
    </script>
</body>
        </html>
