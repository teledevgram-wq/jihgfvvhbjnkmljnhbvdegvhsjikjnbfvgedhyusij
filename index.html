<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Devstral AI</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', sans-serif;
        }

        body {
            background: #f5f5f5;
            color: #000000;
            min-height: 100vh;
        }

        @media (min-width: 769px) {
            body {
                display: flex;
                justify-content: center;
                align-items: center;
                background: linear-gradient(145deg, #e0e0e0 0%, #f5f5f5 100%);
            }

            .chat-wrapper {
                width: 100%;
                max-width: 1200px;
                height: 90vh;
                margin: 5vh auto;
                background: #ffffff;
                border-radius: 24px;
                box-shadow: 0 20px 60px rgba(0,0,0,0.3);
                display: flex;
                overflow: hidden;
            }

            .sidebar {
                width: 300px;
                background: #fafafa;
                border-right: 2px solid #000000;
                display: flex;
                flex-direction: column;
            }

            .sidebar-header {
                padding: 24px 20px;
                border-bottom: 2px solid #000000;
            }

            .sidebar-header h2 {
                font-size: 20px;
                font-weight: 600;
                margin-bottom: 16px;
            }

            .new-chat-btn {
                width: 100%;
                padding: 12px;
                background: #000000;
                color: #ffffff;
                border: 2px solid #000000;
                border-radius: 12px;
                font-size: 14px;
                font-weight: 600;
                cursor: pointer;
                transition: all 0.2s;
            }

            .chats-list {
                flex: 1;
                overflow-y: auto;
                padding: 16px;
            }

            .chat-item {
                padding: 16px;
                background: #ffffff;
                border: 2px solid #000000;
                border-radius: 12px;
                margin-bottom: 12px;
                cursor: pointer;
            }

            .chat-item.active {
                background: #000000;
                color: #ffffff;
            }

            .main-chat {
                flex: 1;
                display: flex;
                flex-direction: column;
                background: #ffffff;
            }
        }

        @media (max-width: 768px) {
            .chat-wrapper {
                width: 100%;
                min-height: 100vh;
                background: #ffffff;
                display: flex;
                flex-direction: column;
            }

            .sidebar {
                width: 100%;
                background: #fafafa;
                border-bottom: 2px solid #000000;
                max-height: 200px;
                overflow-y: auto;
            }

            .sidebar-header {
                padding: 16px;
                border-bottom: 2px solid #000000;
                position: sticky;
                top: 0;
                background: #fafafa;
            }

            .new-chat-btn {
                width: 100%;
                padding: 12px;
                background: #000000;
                color: #ffffff;
                border: 2px solid #000000;
                border-radius: 10px;
                font-size: 14px;
                font-weight: 600;
                cursor: pointer;
            }

            .chats-list {
                padding: 12px;
                display: flex;
                gap: 10px;
                overflow-x: auto;
            }

            .chat-item {
                min-width: 200px;
                padding: 12px;
                background: #ffffff;
                border: 2px solid #000000;
                border-radius: 10px;
                cursor: pointer;
                flex-shrink: 0;
            }

            .chat-item.active {
                background: #000000;
                color: #ffffff;
            }

            .main-chat {
                flex: 1;
                display: flex;
                flex-direction: column;
                background: #ffffff;
                height: calc(100vh - 200px);
            }
        }

        .chat-header {
            padding: 20px 24px;
            border-bottom: 2px solid #000000;
            background: #ffffff;
        }

        .chat-header h1 {
            font-size: 24px;
            font-weight: 600;
            margin-bottom: 4px;
        }

        .chat-header p {
            color: #666666;
            font-size: 14px;
        }

        .messages-container {
            flex: 1;
            overflow-y: auto;
            padding: 24px;
            display: flex;
            flex-direction: column;
            gap: 16px;
            background: #fafafa;
        }

        .message {
            display: flex;
            max-width: 70%;
        }

        .user-message {
            align-self: flex-end;
        }

        .bot-message {
            align-self: flex-start;
        }

        .message-content {
            padding: 14px 18px;
            border-radius: 18px;
            word-wrap: break-word;
            box-shadow: 0 2px 5px rgba(0,0,0,0.1);
        }

        .user-message .message-content {
            background: rgba(0, 0, 0, 0.9);
            color: #ffffff;
            border-bottom-right-radius: 4px;
        }

        .bot-message .message-content {
            background: rgba(240, 240, 240, 0.8);
            color: #000000;
            border-bottom-left-radius: 4px;
        }

        .message-text {
            line-height: 1.5;
            font-size: 15px;
        }

        .message-text strong { font-weight: 700; }
        .message-text em { font-style: italic; }
        .message-text code {
            background: rgba(0, 0, 0, 0.1);
            padding: 2px 6px;
            border-radius: 6px;
            font-family: monospace;
            font-size: 13px;
        }
        .message-text blockquote {
            background: rgba(0, 0, 0, 0.05);
            padding: 10px;
            border-radius: 10px;
            margin: 8px 0;
            border-left: 4px solid #000000;
        }

        .input-area {
            padding: 20px 24px;
            border-top: 2px solid #000000;
            background: #ffffff;
            display: flex;
            gap: 12px;
        }

        .input-area input {
            flex: 1;
            background: #f5f5f5;
            border: 2px solid #000000;
            border-radius: 30px;
            padding: 14px 20px;
            color: #000000;
            font-size: 16px;
            outline: none;
        }

        .input-area button {
            background: #000000;
            color: #ffffff;
            border: 2px solid #000000;
            border-radius: 30px;
            padding: 14px 30px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
        }

        .input-area button:disabled {
            background: #cccccc;
            border-color: #cccccc;
            color: #666666;
            cursor: not-allowed;
        }

        .typing-indicator {
            display: flex;
            gap: 4px;
            padding: 12px 16px;
            background: rgba(240, 240, 240, 0.8);
            border-radius: 18px;
            width: fit-content;
        }

        .typing-indicator span {
            width: 8px;
            height: 8px;
            background: #000000;
            border-radius: 50%;
            animation: typing 1.4s infinite ease-in-out;
        }

        @keyframes typing {
            0%, 60%, 100% { transform: translateY(0); opacity: 0.3; }
            30% { transform: translateY(-8px); opacity: 1; }
        }

        .typing-indicator span:nth-child(2) { animation-delay: 0.2s; }
        .typing-indicator span:nth-child(3) { animation-delay: 0.4s; }
    </style>
</head>
<body>
    <div class="chat-wrapper" id="app">
        <div class="sidebar">
            <div class="sidebar-header">
                <h2>💬 ЧАТЫ</h2>
                <button class="new-chat-btn" onclick="createNewChat()">+ НОВЫЙ ЧАТ</button>
            </div>
            <div class="chats-list" id="chatsList"></div>
        </div>
        
        <div class="main-chat">
            <div class="chat-header">
                <h1 id="chatTitle">Devstral AI</h1>
                <p id="chatSubtitle">by de_vstvenik</p>
            </div>
            
            <div class="messages-container" id="messagesContainer"></div>
            
            <div class="input-area">
                <input type="text" id="messageInput" placeholder="Напишите сообщение..." onkeypress="handleKeyPress(event)">
                <button id="sendButton" onclick="sendMessage()">➤</button>
            </div>
        </div>
    </div>

    <script>
        const MISTRAL_API_KEY = "DDyw1QG5kQhTTjhi1f9byoQTHgdCyJiC";
        const MODEL = "devstral-latest";
        
        let chats = JSON.parse(localStorage.getItem('chats')) || [];
        let currentChatId = null;
        let isLoading = false;

        const systemPrompt = {
            role: "system",
            content: "Ты Devstral - дружелюбный AI помощник! Общайся естественно, иногда используй эмодзи. Отвечай в мужском роде. Форматирование: *текст* для жирного, _текст_ для курсива, `код` для кода, > для многострочного кода. Не используй ```."
        };

        function saveChats() {
            localStorage.setItem('chats', JSON.stringify(chats));
        }

        function createNewChat() {
            const chatId = Date.now().toString();
            const newChat = {
                id: chatId,
                name: 'Новый чат',
                messages: [systemPrompt, {
                    role: 'assistant',
                    content: '👋 Привет! Я Devstral AI. Задавай вопросы!'
                }],
                created: Date.now()
            };
            
            chats.push(newChat);
            saveChats();
            currentChatId = chatId;
            renderChatsList();
            loadChat(chatId);
        }

        function loadChat(chatId) {
            currentChatId = chatId;
            const chat = chats.find(c => c.id === chatId);
            if (chat) {
                document.getElementById('chatTitle').textContent = chat.name;
                renderMessages(chat.messages.filter(m => m.role !== 'system'));
            }
            renderChatsList();
        }

        function renderChatsList() {
            const list = document.getElementById('chatsList');
            list.innerHTML = '';
            
            chats.sort((a, b) => b.created - a.created).forEach(chat => {
                const lastMsg = chat.messages[chat.messages.length - 1]?.content || '';
                const preview = lastMsg.substring(0, 30) + (lastMsg.length > 30 ? '...' : '');
                
                const div = document.createElement('div');
                div.className = `chat-item ${currentChatId === chat.id ? 'active' : ''}`;
                div.onclick = () => loadChat(chat.id);
                div.innerHTML = `
                    <div class="chat-name">${chat.name}</div>
                    <div class="chat-preview">${preview}</div>
                `;
                list.appendChild(div);
            });
        }

        function renderMessages(messages) {
            const container = document.getElementById('messagesContainer');
            container.innerHTML = '';
            messages.forEach(msg => addMessage(msg.role, msg.content, false));
            container.scrollTop = container.scrollHeight;
        }

        function addMessage(role, content, save = true) {
            const container = document.getElementById('messagesContainer');
            const messageDiv = document.createElement('div');
            messageDiv.className = `message ${role === 'user' ? 'user-message' : 'bot-message'}`;
            
            const contentDiv = document.createElement('div');
            contentDiv.className = 'message-content';
            
            const textDiv = document.createElement('div');
            textDiv.className = 'message-text';
            textDiv.innerHTML = formatMessage(content);
            
            contentDiv.appendChild(textDiv);
            messageDiv.appendChild(contentDiv);
            container.appendChild(messageDiv);
            container.scrollTop = container.scrollHeight;
            
            if (save && currentChatId) {
                const chat = chats.find(c => c.id === currentChatId);
                if (chat) {
                    chat.messages.push({ role, content });
                    if (chat.messages.length > 2 && chat.name === 'Новый чат' && role === 'user') {
                        chat.name = content.substring(0, 20) + (content.length > 20 ? '...' : '');
                    }
                    saveChats();
                    renderChatsList();
                }
            }
        }

        function formatMessage(text) {
            if (!text) return '';
            
            let formatted = text
                .replace(/</g, '&lt;')
                .replace(/>/g, '&gt;');
            
            let lines = formatted.split('\n');
            let result = [];
            let i = 0;
            
            while (i < lines.length) {
                if (lines[i].trim().startsWith('&gt;')) {
                    let quoteLines = [];
                    while (i < lines.length && lines[i].trim().startsWith('&gt;')) {
                        quoteLines.push(lines[i].replace(/^(&gt;\s?)/, ''));
                        i++;
                    }
                    result.push('<blockquote>' + quoteLines.join('<br>') + '</blockquote>');
                } else {
                    result.push(lines[i]);
                    i++;
                }
            }
            
            formatted = result.join('\n')
                .replace(/\*\*(.*?)\*\*/g, '<strong>$1</strong>')
                .replace(/\*(.*?)\*/g, '<strong>$1</strong>')
                .replace(/_(.*?)_/g, '<em>$1</em>')
                .replace(/`(.*?)`/g, '<code>$1</code>');
            
            return formatted.replace(/\n/g, '<br>');
        }

        function showTyping() {
            const container = document.getElementById('messagesContainer');
            const typingDiv = document.createElement('div');
            typingDiv.className = 'message bot-message';
            typingDiv.id = 'typingIndicator';
            
            const contentDiv = document.createElement('div');
            contentDiv.className = 'message-content';
            contentDiv.innerHTML = '<div class="typing-indicator"><span></span><span></span><span></span></div>';
            
            typingDiv.appendChild(contentDiv);
            container.appendChild(typingDiv);
            container.scrollTop = container.scrollHeight;
        }

        function hideTyping() {
            document.getElementById('typingIndicator')?.remove();
        }

        function handleKeyPress(event) {
            if (event.key === 'Enter') sendMessage();
        }

        async function sendMessage() {
            const input = document.getElementById('messageInput');
            const message = input.value.trim();
            const sendButton = document.getElementById('sendButton');
            
            if (!message || isLoading || !currentChatId) return;
            
            input.value = '';
            addMessage('user', message);
            
            isLoading = true;
            sendButton.disabled = true;
            showTyping();
            
            try {
                const chat = chats.find(c => c.id === currentChatId);
                const messagesForAPI = chat.messages.map(m => ({
                    role: m.role,
                    content: m.content
                }));
                
                const response = await fetch('https://api.mistral.ai/v1/chat/completions', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                        'Authorization': `Bearer ${MISTRAL_API_KEY}`
                    },
                    body: JSON.stringify({
                        model: MODEL,
                        messages: messagesForAPI
                    })
                });
                
                if (!response.ok) throw new Error(`HTTP error! status: ${response.status}`);
                
                const data = await response.json();
                const reply = data.choices[0].message.content;
                
                hideTyping();
                addMessage('assistant', reply);
                
            } catch (error) {
                console.error('Error:', error);
                hideTyping();
                addMessage('assistant', 'Ошибка API. Попробуй позже.');
            } finally {
                isLoading = false;
                sendButton.disabled = false;
            }
        }

        if (chats.length === 0) {
            createNewChat();
        } else {
            currentChatId = chats[0].id;
            renderChatsList();
            loadChat(currentChatId);
        }
    </script>
</body>
    </html>
